name: YouTube to X auto post

on:
  schedule:
    # 10分おきにチェック（UTC基準。GitHub側の混雑で多少ズレることがある）
    - cron: "*/10 * * * *"
    # 60日間pushが無いとscheduleが自動停止するのを防ぐための週次keep-alive
    - cron: "0 3 * * 1"
  workflow_dispatch: {}  # 手動実行もできるようにしておく

# 同時に複数のワークフローが走って状態ファイルの取り合いにならないようにする
concurrency:
  group: youtube-to-x-post
  cancel-in-progress: false

permissions:
  contents: write  # last_video_id.txt をコミットするために必要

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 新着動画チェック & 投稿
        env:
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python post_new_video.py

      - name: keep-alive用タイムスタンプ更新（週次実行時のみ）
        if: github.event.schedule == '0 3 * * 1'
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > .keep-alive

      - name: 状態ファイルをコミット
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_video_id.txt .keep-alive 2>/dev/null || git add last_video_id.txt
          git diff --staged --quiet || git commit -m "update last posted video id / keep-alive"
          git pull --rebase origin main
          git push
