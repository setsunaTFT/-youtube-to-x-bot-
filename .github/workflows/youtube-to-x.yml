name: YouTube to X auto post

on:
  schedule:
    # 15分おきにチェック（UTC基準。負荷を抑えたいなら間隔を伸ばしてOK）
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく

permissions:
  contents: write  # last_video_id.txt をコミットするために必要

jobs:
  check-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 新着動画チェック & 投稿
        env:
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python post_new_video.py

      - name: 状態ファイルをコミット
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_video_id.txt
          git diff --staged --quiet || git commit -m "update last posted video id"
          git push
